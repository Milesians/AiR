name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true  # 不取消，等待上一次完成

env:
  REGISTRY: ghcr.io

jobs:
  build-binary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 生成版本号
        id: version
        run: echo "version=$(date +'%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: 安装 uv
        uses: astral-sh/setup-uv@v6

      - name: 安装 Python
        run: uv python install 3.13

      - name: 安装依赖
        run: uv sync --group dev

      - name: 编译二进制
        run: uv run pyinstaller air.spec --distpath dist/

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: air-linux-amd64
          path: dist/air

#      - name: 创建 GitHub Release
#        uses: softprops/action-gh-release@v2
#        with:
#          tag_name: v${{ steps.version.outputs.version }}
#          name: v${{ steps.version.outputs.version }}
#          generate_release_notes: true
#          make_latest: true
#          files: dist/air

  build-docker:
    runs-on: ubuntu-latest
    needs: build-binary
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 下载二进制
        uses: actions/download-artifact@v4
        with:
          name: air-linux-amd64
          path: dist/

      - name: 计算小写镜像名
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/air' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-binary.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max