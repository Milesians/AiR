name: Build and Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 提取 Tag 名称
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: 计算小写镜像名
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/air' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=AiR
            org.opencontainers.image.description=AI Code Reviewer for CI/CD pipelines
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.IMAGE_TAG }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 生成 Release 镜像说明
        uses: actions/github-script@v7
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          LATEST_IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          script: |
            const fs = require("fs");
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            const notes = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: process.env.IMAGE_TAG,
            });
            const packageName = process.env.IMAGE_NAME.split("/").slice(1).join("/");
            const packageUrl =
              `https://github.com/${process.env.GITHUB_REPOSITORY}/pkgs/container/${encodeURIComponent(packageName)}`;
            const body = [
              "## Container image",
              "",
              `- Package: [${process.env.IMAGE_NAME}](${packageUrl})`,
              `- Version image: \`${process.env.IMAGE_REF}\``,
              `- Latest image: \`${process.env.LATEST_IMAGE_REF}\``,
              "",
              "```bash",
              `docker pull ${process.env.IMAGE_REF}`,
              "```",
              "",
              notes.data.body || "",
            ].join("\n");
            fs.writeFileSync("release-notes.md", body);

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.IMAGE_TAG }}
          body_path: release-notes.md
          make_latest: true
