name: Build and Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 提取 Tag 名称
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: 计算小写镜像名
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/air' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 导出 Docker 镜像为 Release 附件
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          ASSET_NAME="air-${{ env.IMAGE_TAG }}-linux-amd64.tar.gz"
          docker pull "${IMAGE_REF}"
          docker save "${IMAGE_REF}" | gzip > "${ASSET_NAME}"
          sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256"
          echo "IMAGE_ASSET=${ASSET_NAME}" >> $GITHUB_ENV

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.IMAGE_TAG }}
          generate_release_notes: true
          files: |
            ${{ env.IMAGE_ASSET }}
            ${{ env.IMAGE_ASSET }}.sha256
