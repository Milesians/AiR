[project]
name = "air"
version = "0.1.0"
description = "AI Code Reviewer for CI/CD pipelines"
requires-python = ">=3.13"
dependencies = [
    "claude-agent-sdk>=0.1.66",
    "python-dotenv>=1.2.2",
    "requests>=2.32.5",
]

[project.scripts]
air = "air.__main__:main_sync"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
