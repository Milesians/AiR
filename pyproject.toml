[project]
name = "air"
version = "0.1.0"
description = "AI Code Reviewer for CI/CD pipelines"
requires-python = ">=3.13"
dependencies = [
    "claude-agent-sdk>=0.1.48",
    "python-dotenv>=1.2.2",
    "python-gitlab>=4.0",
]

[project.scripts]
air = "air.__main__:main_sync"

[dependency-groups]
dev = [
    "pyinstaller>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
